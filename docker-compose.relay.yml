version: "3.8"

services:
  imprint-relay:
    image: ghcr.io/alexandruleca/imprint-relay:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["relay", "--port", "8430"]
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.imprint-relay.rule=Host(`sync.yourdomain.com`)"
        - "traefik.http.routers.imprint-relay.entrypoints=websecure"
        - "traefik.http.routers.imprint-relay.tls.certresolver=letsencrypt"
        - "traefik.http.services.imprint-relay.loadbalancer.server.port=8430"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
