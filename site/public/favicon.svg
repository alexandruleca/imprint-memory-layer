<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ibar" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#tile)"/>

  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>

  <g fill="#ffffff" opacity="0.45" filter="url(#glow)">
    <rect x="16" y="16" width="32" height="7" rx="3.5"/>
    <rect x="28.5" y="23" width="7" height="18" rx="3"/>
    <rect x="16" y="41" width="32" height="7" rx="3.5"/>
  </g>

  <g fill="url(#ibar)">
    <rect x="16" y="16" width="32" height="7" rx="3.5"/>
    <rect x="28.5" y="23" width="7" height="18" rx="3"/>
    <rect x="16" y="41" width="32" height="7" rx="3.5"/>
  </g>

  <circle cx="10" cy="10" r="1.6" fill="#22d3ee" opacity="0.85"/>
  <circle cx="54" cy="54" r="1.6" fill="#22d3ee" opacity="0.85"/>
</svg>
