name: Bug report
description: Something is broken or behaves incorrectly.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more context you add, the easier it is to reproduce.

        Filing an issue does **not** create a support contract, SLA, or warranty about fixes or response times.

        **Security issues:** do not use this form. See [`SECURITY.md`](https://github.com/alexandruleca/imprint-memory-layer/blob/main/SECURITY.md) and use [GitHub private security reporting](https://github.com/alexandruleca/imprint-memory-layer/security/advisories/new).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences — what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact error messages, logs, or screenshots where helpful.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or clicks from a clean state.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and platform help a lot.
      placeholder: |
        - Imprint / `imprint version`: …
        - OS & arch (e.g. Ubuntu 24.04 x86_64, macOS 15 arm64): …
        - Host tool (Claude Code, Cursor, Codex, Copilot, Cline): …
        - Go version (if built from source): …
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
