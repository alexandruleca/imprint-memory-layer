name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for **product or UX** ideas. For pure questions, [Discussions](https://github.com/alexandruleca/imprint-memory-layer/discussions) is often a better fit.

        Submitting a request does **not** obligate maintainers to implement it or respond by a deadline.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What workflow is painful, missing, or inconsistent today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Imprint behave instead? CLI flags, MCP tools, docs, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, or workarounds you use today.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope & constraints
      description: Local-only by default, backwards compatibility, performance, or security expectations.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have checked the README roadmap and searched issues for similar requests.
          required: true
