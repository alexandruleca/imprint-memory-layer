name: Dev Release

on:
  push:
    branches: [dev]

concurrency:
  group: dev-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/alexandruleca/imprint-relay

jobs:
  release:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          LAST_STABLE=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LAST_STABLE" ]; then LAST_STABLE="v0.0.0"; fi
          VERSION="${LAST_STABLE}-dev.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed dev version: $VERSION"

      - name: Create and push git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Dev release $VERSION"
          git push origin "$VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make all

      - name: Package per-platform archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: make package

      - name: Generate checksums
        working-directory: dist
        run: sha256sum imprint-*.tar.gz imprint-*.zip > SHA256SUMS

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --prerelease \
            --title "$VERSION" \
            --notes "Automated dev build from commit ${{ github.sha }}." \
            dist/imprint-linux-amd64.tar.gz \
            dist/imprint-linux-arm64.tar.gz \
            dist/imprint-darwin-amd64.tar.gz \
            dist/imprint-darwin-arm64.tar.gz \
            dist/imprint-windows-amd64.zip \
            dist/SHA256SUMS

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
