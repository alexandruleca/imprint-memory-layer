name: Image

on:
  workflow_run:
    workflows: ["Release", "Dev Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to build (e.g. v1.2.3 or v1.2.3-dev.4). Defaults to latest matching channel."
        required: false
      channel:
        description: "Channel for floating tag"
        required: false
        default: "stable"
        type: choice
        options: [stable, dev]

concurrency:
  group: image-${{ github.event.workflow_run.name || inputs.channel }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  resolve:
    # Skip if the triggering release run failed. Always run on manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, x64]
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - name: Determine channel
        id: channel
        env:
          UPSTREAM: ${{ github.event.workflow_run.name }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "$UPSTREAM" = "Dev Release" ]; then
              CHANNEL=dev
            else
              CHANNEL=stable
            fi
          else
            CHANNEL="${INPUT_CHANNEL:-stable}"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Channel: $CHANNEL"

      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$CHANNEL" = "dev" ]; then
            VERSION=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$' | head -1 || true)
          else
            VERSION=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "No matching tag found for channel=$CHANNEL. Nothing to build."
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "major_minor=v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $VERSION"

  build:
    needs: resolve
    if: needs.resolve.outputs.version != ''
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lightweight sync relay — Go binary only, stateless.
          - name: relay
            image: ghcr.io/alexandruleca/imprint-relay
            dockerfile: Dockerfile
          # Full Imprint runtime — Go CLI + Python + dashboard UI + auto-Qdrant.
          - name: imprint
            image: ghcr.io/alexandruleca/imprint
            dockerfile: Dockerfile.imprint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source at tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: git checkout "$VERSION"

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ needs.resolve.outputs.version }}
          MAJOR_MINOR: ${{ needs.resolve.outputs.major_minor }}
          CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: |
          set -euo pipefail
          TAGS="${IMAGE}:${VERSION}"
          if [ "$CHANNEL" = "dev" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:dev"
          else
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
            if [ -n "${MAJOR_MINOR:-}" ]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:${MAJOR_MINOR}"
            fi
          fi
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.resolve.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
