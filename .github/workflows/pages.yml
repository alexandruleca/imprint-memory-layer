name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
      - 'README.md'
      - 'BENCHMARK.md'
      - '.github/workflows/pages.yml'
  # Rebuild + redeploy after a successful Release so the download page
  # (site/scripts/build-releases.mjs) picks up the new tag's .tar.gz/.zip/
  # .exe/.pkg assets without waiting on the GitHub Pages cache or a manual
  # dispatch.
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # workflow_run fires on both success and failure; skip the deploy if
    # the Release run failed (no new assets to publish). Push/dispatch
    # triggers have no workflow_run context so `conclusion` is empty and
    # the expression short-circuits to true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          PUBLIC_GA4_ID: G-ZPW1M6BCC7
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
