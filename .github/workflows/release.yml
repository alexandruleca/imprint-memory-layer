name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Force version bump (overrides commit analysis)"
        required: false
        default: "auto"
        type: choice
        options: [auto, patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: [self-hosted, linux, x64]
    outputs:
      version: ${{ steps.compute.outputs.version }}
      bump: ${{ steps.compute.outputs.bump }}
      major_minor: ${{ steps.compute.outputs.major_minor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: compute
        env:
          FORCE_BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [ -z "$LAST" ]; then
            LAST_SEMVER="0.0.0"
            RANGE_ARGS=()
          else
            LAST_SEMVER="${LAST#v}"
            RANGE_ARGS=("${LAST}..HEAD")
          fi

          HAS_MAJOR=0; HAS_MINOR=0; HAS_PATCH=0

          # Iterate commit messages (subject + body per commit, NUL-separated)
          while IFS= read -r -d '' commit; do
            [ -z "$commit" ] && continue
            SUBJECT=$(printf '%s' "$commit" | head -n1)
            # Breaking change: "feat!:", "fix(scope)!:", or "BREAKING CHANGE:" in body
            if printf '%s\n' "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
              HAS_MAJOR=1; continue
            fi
            if printf '%s\n' "$commit" | grep -qE '^BREAKING[ -]CHANGE:'; then
              HAS_MAJOR=1; continue
            fi
            # feat → minor
            if printf '%s\n' "$SUBJECT" | grep -qE '^feat(\([^)]+\))?:'; then
              HAS_MINOR=1; continue
            fi
            # fix, perf → patch
            if printf '%s\n' "$SUBJECT" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
              HAS_PATCH=1; continue
            fi
          done < <(git log "${RANGE_ARGS[@]}" --pretty=format:'%B%x00')

          if [ "${FORCE_BUMP:-auto}" != "auto" ] && [ -n "${FORCE_BUMP:-}" ]; then
            BUMP="$FORCE_BUMP"
          elif [ "$HAS_MAJOR" = 1 ]; then
            BUMP=major
          elif [ "$HAS_MINOR" = 1 ]; then
            BUMP=minor
          elif [ "$HAS_PATCH" = 1 ]; then
            BUMP=patch
          else
            BUMP=none
          fi

          IFS='.' read -r MAJ MIN PAT <<< "$LAST_SEMVER"

          if [ -z "$LAST" ] && [ "$BUMP" != "none" ]; then
            NEW="0.1.0"
          else
            case "$BUMP" in
              major) NEW="$((MAJ+1)).0.0" ;;
              minor) NEW="${MAJ}.$((MIN+1)).0" ;;
              patch) NEW="${MAJ}.${MIN}.$((PAT+1))" ;;
              none)  NEW="" ;;
            esac
          fi

          echo "Analysis: last=$LAST bump=$BUMP next=${NEW:-<skip>}"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          if [ -n "$NEW" ]; then
            IFS='.' read -r NM NN _ <<< "$NEW"
            echo "version=v$NEW" >> "$GITHUB_OUTPUT"
            echo "major_minor=v${NM}.${NN}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "major_minor=" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: analyze
    if: needs.analyze.outputs.version != ''
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create and push git tag
        env:
          VERSION: ${{ needs.analyze.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        env:
          VERSION: ${{ needs.analyze.outputs.version }}
        run: make all

      - name: Package per-platform archives
        env:
          VERSION: ${{ needs.analyze.outputs.version }}
        run: make package

      - name: Generate checksums
        working-directory: dist
        run: sha256sum imprint-*.tar.gz imprint-*.zip > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.analyze.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/imprint-linux-amd64.tar.gz \
            dist/imprint-linux-arm64.tar.gz \
            dist/imprint-darwin-amd64.tar.gz \
            dist/imprint-darwin-arm64.tar.gz \
            dist/imprint-windows-amd64.zip \
            dist/SHA256SUMS
          # Relay container image is built by .github/workflows/image.yml,
          # which fires on workflow_run after this workflow succeeds.
          # Native installers (.exe / .pkg) are attached by the
          # package-windows / package-macos jobs below.

  package-windows:
    needs: [analyze, release]
    if: needs.analyze.outputs.version != ''
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.analyze.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'imprint-windows-amd64.zip' \
            --dir dist

      - name: Extract release archive
        shell: pwsh
        run: |
          Expand-Archive -Path dist\imprint-windows-amd64.zip -DestinationPath dist -Force

      - name: Install ImageMagick (for icon rendering)
        shell: pwsh
        run: choco install imagemagick --no-progress -y

      - name: Generate .ico from site logo
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installers\windows\assets -Force | Out-Null
          & magick -background none site\public\logo.svg `
              -define icon:auto-resize=16,24,32,48,64,128,256 `
              installers\windows\assets\imprint.ico
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path installers\windows\assets\imprint.ico)) {
              Write-Warning "Icon generation failed; Inno will fall back to the exe icon."
          }

      - name: Build installer
        shell: pwsh
        env:
          VERSION: ${{ needs.analyze.outputs.version }}
        run: |
          $ver = $env:VERSION.TrimStart('v')
          $src = Resolve-Path dist\imprint-windows-amd64
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
              /DImprintVersion=$ver `
              /DImprintSource=$src `
              /O"$(Resolve-Path dist)" `
              installers\windows\imprint.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with $LASTEXITCODE" }
          Get-ChildItem dist\*.exe | Format-Table Name, Length

      - name: Upload installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.analyze.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          INSTALLER="imprint-windows-amd64-setup.exe"
          [ -f "$INSTALLER" ] || { echo "installer missing: $INSTALLER"; ls -la; exit 1; }
          gh release upload "$VERSION" "$INSTALLER" --clobber

  package-macos:
    needs: [analyze, release]
    if: needs.analyze.outputs.version != ''
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.analyze.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "imprint-darwin-${ARCH}.tar.gz" \
            --dir dist
          tar -xzf "dist/imprint-darwin-${ARCH}.tar.gz" -C dist

      - name: Install librsvg (for icon rendering)
        run: brew install librsvg

      - name: Build .pkg
        env:
          VERSION: ${{ needs.analyze.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          OUT="dist/imprint-darwin-${ARCH}.pkg"
          ./installers/macos/build-pkg.sh \
            --version "$VER" \
            --arch "$ARCH" \
            --source "dist/imprint-darwin-${ARCH}" \
            --out    "$OUT"
          ls -la "$OUT"

      - name: Upload installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.analyze.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          cd dist
          PKG="imprint-darwin-${ARCH}.pkg"
          [ -f "$PKG" ] || { echo "pkg missing: $PKG"; ls -la; exit 1; }
          gh release upload "$VERSION" "$PKG" --clobber
